<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace">
  <!-- Terminal background with rounded corners -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0d0b"/>
      <stop offset="100%" stop-color="#141512"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Terminal window -->
  <rect x="0" y="0" width="900" height="340" rx="12" fill="url(#bgGrad)" stroke="#2a2b27" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="34" rx="12" fill="#1d1f1b"/>
  <rect x="0" y="20" width="900" height="14" fill="#1d1f1b"/>

  <!-- Window controls -->
  <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17" r="6" fill="#27c93f"/>

  <!-- Title -->
  <text x="450" y="22" fill="#6e6c65" text-anchor="middle" font-size="12">dotto@gold-coast ─ zsh</text>

  <!-- === Animated terminal content === -->
  <g font-size="15" filter="url(#glow)">

    <!-- Line 1: prompt + command -->
    <text x="24" y="72" fill="#2dbd82" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.01s" begin="0.3s" fill="freeze"/>
      ❯
    </text>
    <text x="44" y="72" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.01s" begin="0.3s" fill="freeze"/>
      whoami
    </text>
    <text x="24" y="96" fill="#a8a89f" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.9s" fill="freeze"/>
      dotto · full-stack dev + data scientist · 🇧🇷 → 🇦🇺
    </text>

    <!-- Line 2 -->
    <text x="24" y="130" fill="#2dbd82" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.01s" begin="1.7s" fill="freeze"/>
      ❯
    </text>
    <text x="44" y="130" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.01s" begin="1.7s" fill="freeze"/>
      cat stack.txt
    </text>
    <text x="24" y="154" fill="#a8a89f" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.3s" fill="freeze"/>
      js · python · next · react · node · fastapi · postgres · supabase · aws
    </text>

    <!-- Line 3 -->
    <text x="24" y="188" fill="#2dbd82" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.01s" begin="3.1s" fill="freeze"/>
      ❯
    </text>
    <text x="44" y="188" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.01s" begin="3.1s" fill="freeze"/>
      ls ./now
    </text>
    <text x="24" y="212" fill="#a8a89f" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.7s" fill="freeze"/>
      rolezin/  ·  the social map of brazilian nightlife
    </text>

    <!-- Line 4 -->
    <text x="24" y="246" fill="#2dbd82" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.01s" begin="4.5s" fill="freeze"/>
      ❯
    </text>
    <text x="44" y="246" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.01s" begin="4.5s" fill="freeze"/>
      echo $MOTTO
    </text>
    <text x="24" y="270" fill="#2dbd82" font-style="italic" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.1s" fill="freeze"/>
      "a tecnologia é a magia da realidade."
    </text>

    <!-- Final prompt with blinking cursor -->
    <text x="24" y="308" fill="#2dbd82" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.01s" begin="6s" fill="freeze"/>
      ❯
    </text>
    <rect x="48" y="295" width="9" height="16" fill="#2dbd82" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.01s" begin="6s" fill="freeze"/>
      <animate attributeName="opacity" values="1;1;0;0" dur="1s" begin="6.1s" repeatCount="indefinite"/>
    </rect>

  </g>
</svg>
