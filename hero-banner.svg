<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 260" preserveAspectRatio="none" font-family="'DM Serif Display', 'Playfair Display', Georgia, serif">
  <defs>
    <!-- Background gradient: deep black -> subtle green glow -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0d0b"/>
      <stop offset="60%" stop-color="#141512"/>
      <stop offset="100%" stop-color="#1a3d2a"/>
    </linearGradient>

    <!-- Radial glow behind the name -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dbd82" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2dbd82" stop-opacity="0"/>
    </radialGradient>

    <!-- Wave mask for the decorative bottom shape -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dbd82" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#2dbd82" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2dbd82" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Glow filter for the title -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="260" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#2a2b27" stroke-width="0.5" opacity="0.35">
    <line x1="0" y1="65" x2="1280" y2="65"/>
    <line x1="0" y1="130" x2="1280" y2="130"/>
    <line x1="0" y1="195" x2="1280" y2="195"/>
  </g>

  <!-- Dot accents in corners -->
  <g fill="#2dbd82" opacity="0.6">
    <circle cx="60" cy="40" r="2"/>
    <circle cx="80" cy="40" r="2"/>
    <circle cx="100" cy="40" r="2"/>
    <circle cx="1180" cy="220" r="2"/>
    <circle cx="1200" cy="220" r="2"/>
    <circle cx="1220" cy="220" r="2"/>
  </g>

  <!-- Green radial glow behind title -->
  <ellipse cx="640" cy="130" rx="420" ry="110" fill="url(#glow)"/>

  <!-- Top tag -->
  <g font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#2dbd82" letter-spacing="3">
    <text x="640" y="58" text-anchor="middle" opacity="0.8">― PORTFOLIO ――――</text>
  </g>

  <!-- Main title -->
  <text x="640" y="150" text-anchor="middle" font-size="88" fill="#ffffff" font-style="italic" filter="url(#softGlow)" font-weight="400">
    Dotto
  </text>

  <!-- Subtitle -->
  <g font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" fill="#a8a89f" letter-spacing="4">
    <text x="640" y="188" text-anchor="middle">FULL-STACK DEVELOPER &#160;·&#160; DATA SCIENTIST</text>
  </g>

  <!-- Bottom accent line with center diamond -->
  <g stroke="#2a2b27" stroke-width="1" fill="none">
    <line x1="420" y1="215" x2="620" y2="215"/>
    <line x1="660" y1="215" x2="860" y2="215"/>
  </g>
  <g transform="translate(640,215) rotate(45)" fill="#2dbd82">
    <rect x="-5" y="-5" width="10" height="10"/>
  </g>

  <!-- Decorative wave at bottom -->
  <path d="M 0 240 Q 160 220 320 240 T 640 240 T 960 240 T 1280 240 L 1280 260 L 0 260 Z" fill="url(#waveGrad)"/>

  <!-- Animated subtle pulse on the diamond -->
  <g transform="translate(640,215) rotate(45)" fill="none" stroke="#2dbd82" stroke-width="1">
    <rect x="-5" y="-5" width="10" height="10" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="width" values="10;24;10" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="height" values="10;24;10" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x" values="-5;-12;-5" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-5;-12;-5" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
